name: Full update (legalize-jp)

on:
  schedule:
    - cron: '0 16 * * *'  # 16:00 UTC = 01:00 JST
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      DATA_DIR: ${{ github.workspace }}/data
      LAWMD_REPO_PATH: ${{ github.workspace }}/legalize-jp

    steps:
      - name: Checkout legalize-jp-fetcher
        uses: actions/checkout@v4

      - name: Checkout legalize-jp
        uses: actions/checkout@v4
        with:
          repository: yno9/legalize-jp
          token: ${{ secrets.LEGALIZE_JP_PAT }}
          path: legalize-jp
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Copy templates to legalize-jp
        run: |
          cp templates/legalize-jp/README.md legalize-jp/README.md
          cp templates/legalize-jp/LICENSE legalize-jp/LICENSE
          cd legalize-jp
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add README.md LICENSE
          git diff --cached --quiet || git commit -m "chore: update README and LICENSE"

      - name: Run daily update
        run: npm run daily

      - name: Persist laws.json
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -f data/laws.json
          git diff --cached --quiet || git commit -m "chore: update laws.json"
          git push origin main

      - name: Push legalize-jp
        run: git -C legalize-jp push origin main
