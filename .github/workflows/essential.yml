name: Essential update (lawcode-jp)

on:
  schedule:
    - cron: '0 15 * * *'  # 15:00 UTC = 00:00 JST
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      DATA_DIR: ${{ github.workspace }}/data
      LAWCODE_REPO_PATH: ${{ github.workspace }}/lawcode-jp
      MD_MODE: essential
      LAWS_FILE: laws-essential.json

    steps:
      - name: Checkout legalize-jp-fetcher
        uses: actions/checkout@v4

      - name: Checkout lawcode-jp
        uses: actions/checkout@v4
        with:
          repository: yno9/lawcode-jp
          token: ${{ secrets.LAWCODE_JP_PAT }}
          path: lawcode-jp
          fetch-depth: 0

      - name: Fetch all branches in lawcode-jp
        run: |
          cd lawcode-jp
          git fetch --all
          git branch -r | grep -v '\->' | while read remote; do
            git branch --track "${remote#origin/}" "$remote" 2>/dev/null || true
          done

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Copy templates to lawcode-jp
        run: |
          cp templates/lawcode-jp/README.md lawcode-jp/README.md
          cp templates/lawcode-jp/LICENSE lawcode-jp/LICENSE
          cd lawcode-jp
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add README.md LICENSE
          git diff --cached --quiet || git commit -m "chore: update README and LICENSE"

      - name: Fetch new JSON
        run: npm run fetch:json

      - name: Generate MD (essential)
        run: npm run generate:md

      - name: Commit to lawcode-jp
        run: npm run commit:md:branch

      - name: Persist laws-essential.json
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -f data/laws-essential.json
          git diff --cached --quiet || git commit -m "chore: update laws-essential.json"
          git pull --rebase origin main
          git push origin main

      - name: Push lawcode-jp
        run: |
          cd lawcode-jp
          echo "=== local branch ==="
          git branch
          echo "=== log (last 5) ==="
          git log --oneline -5
          echo "=== push ==="
          git push origin current
          git branch | grep 'future/' | while read branch; do
            git push origin "$branch" || true
          done
